  <style>
    :root {
      --accent:       #2dd4bf;
      --accent-glow:  rgba(45,212,191,0.35);
      --text-1:       #ffffff;
      --text-2:       rgba(255,255,255,0.65);
      --border:       rgba(255,255,255,0.12);
      --border-teal:  rgba(45,212,191,0.35);
      --glass:        rgba(255,255,255,0.07);
      --card-shadow:  0 4px 24px rgba(0,0,0,0.35),0 1px 0 rgba(255,255,255,0.06) inset;
    }

    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    html{scroll-behavior:smooth;}
    body{
      background:linear-gradient(160deg,#071e1b 0%,#0d3530 45%,#093028 70%,#071e1b 100%) fixed;
      color:var(--text-1);
      font-family:'Inter',sans-serif;
      font-size:16px;line-height:1.5;
      -webkit-font-smoothing:antialiased;
      min-height:100vh;
      display:flex;flex-direction:column;
    }
    a{text-decoration:none;color:inherit;}

    .container{width:100%;max-width:1200px;margin:0 auto;padding:0 20px;}

    .nav{
      display:flex;align-items:center;justify-content:space-between;
      padding:20px 0;border-bottom:1px solid var(--border);
    }
    .nav-logo{font-size:20px;font-weight:900;letter-spacing:-0.04em;color:var(--accent);}

    .main{
      flex:1;display:flex;align-items:center;justify-content:center;
      padding:60px 20px;
    }

    .card{
      background:var(--glass);
      border:1px solid rgba(255,255,255,0.13);
      border-radius:24px;padding:64px 48px;
      max-width:560px;width:100%;text-align:center;
      box-shadow:var(--card-shadow),0 0 80px rgba(45,212,191,0.06);
      backdrop-filter:blur(16px);
      -webkit-backdrop-filter:blur(16px);
      opacity:0;transform:translateY(30px);
      animation:rise .55s ease forwards;
    }

    .check-ring{
      width:80px;height:80px;border-radius:50%;
      background:rgba(45,212,191,0.12);
      border:1.5px solid var(--border-teal);
      display:flex;align-items:center;justify-content:center;
      margin:0 auto 28px;
      box-shadow:0 0 32px rgba(45,212,191,0.15);
    }
    .check-ring svg{width:36px;height:36px;}

    h1{
      font-size:38px;font-weight:700;
      letter-spacing:-0.03em;line-height:1.1;
      color:var(--text-1);margin-bottom:16px;
    }

    .sub{
      font-size:17px;font-weight:400;
      color:var(--text-2);line-height:1.6;
      margin-bottom:36px;
    }
    .sub strong{color:var(--text-1);font-weight:700;}

    .btn-back{
      display:inline-flex;align-items:center;justify-content:center;
      padding:14px 28px;border-radius:100px;
      font-size:16px;font-weight:700;color:var(--accent);
      background:rgba(45,212,191,0.1);
      border:1.5px solid var(--border-teal);
      backdrop-filter:blur(8px);
      transition:background .2s,box-shadow .2s;
    }
    .btn-back:hover{
      background:rgba(45,212,191,0.18);
      box-shadow:0 4px 24px var(--accent-glow);
    }

    .footer-band{
      background:rgba(0,0,0,0.3);border-top:1px solid var(--border);
      padding:40px 0;text-align:center;
    }
    .footer-copy{font-size:14px;color:var(--text-2);}

    @keyframes rise{to{opacity:1;transform:translateY(0);}}

    @media(max-width:600px){
      .card{padding:40px 24px;}
      h1{font-size:28px;}
      .sub{font-size:15px;}
    }
  </style>
</head>
<body>

<div class="container">
  <nav class="nav">
    <span class="nav-logo">jadpal.ai</span>
  </nav>
</div>

<main class="main">
  <div class="card">

    <div class="check-ring">
      <svg viewBox="0 0 36 36" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="18" cy="18" r="17" stroke="#2dd4bf" stroke-width="1.5" stroke-opacity="0.4"/>
        <path d="M10 18.5L15.5 24L26 13" stroke="#2dd4bf" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>

    <h1>Application received!</h1>

    <p class="sub">
      Thanks for applying. We'll review your details and <strong>reach out within 24 hours</strong>
      if you qualify for a free automation audit.
    </p>

    <a class="btn-back" href="index.html">← Back to jadpal.ai</a>

  </div>
</main>

<footer class="footer-band">
  <p class="footer-copy">jadpal.ai &copy; 2026 &ndash; All rights reserved.</p>
</footer>

</body>
</html>
