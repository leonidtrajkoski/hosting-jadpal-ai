<!doctype html>
<html dir="ltr" lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width">
  <title>Apply — jadpal.ai</title>
  <meta name="description" content="Submit your application to see if you qualify for a free automation audit.">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg:           #0d1220;
      --surface:      #182050;
      --surface2:     #1e2a62;
      --accent:       #e8c55c;
      --text-1:       #e8e3d8;
      --text-2:       #9ba4be;
      --text-3:       #3d4870;
    }

    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    html{scroll-behavior:smooth;}
    body{
      background:var(--bg);
      color:var(--text-1);
      font-family:'Inter',sans-serif;
      font-size:16px;
      line-height:1.5;
      -webkit-font-smoothing:antialiased;
      overflow-x:hidden;
      min-height:100vh;
    }
    a{text-decoration:none;color:inherit;}

    .container{
      width:100%;
      max-width:1200px;
      margin:0 auto;
      padding:0 20px;
    }

    /* ── top nav ── */
    .nav{
      display:flex;
      align-items:center;
      justify-content:space-between;
      padding:20px 0;
      border-bottom:1px solid var(--surface2);
    }
    .nav-logo{
      font-size:20px;
      font-weight:900;
      letter-spacing:-0.04em;
      color:var(--accent);
    }
    .nav-back{
      font-size:14px;
      font-weight:500;
      color:var(--text-2);
      display:inline-flex;
      align-items:center;
      gap:6px;
      transition:color .2s;
    }
    .nav-back:hover{color:var(--text-1);}

    /* ── page header ── */
    .page-header{
      text-align:center;
      padding:56px 20px 40px;
      opacity:0;
      transform:translateY(40px);
      animation:rise .55s ease forwards;
    }
    .page-header h1{
      font-size:52px;
      font-weight:700;
      letter-spacing:-0.03em;
      line-height:1.1;
      color:var(--text-1);
    }
    .page-header p{
      margin-top:14px;
      font-size:18px;
      font-weight:500;
      color:var(--text-2);
      max-width:560px;
      margin-left:auto;
      margin-right:auto;
    }

    /* ── divider ── */
    .divider{
      width:100%;
      max-width:780px;
      margin:0 auto 32px;
      height:1px;
      background:var(--surface2);
      opacity:0;
      animation:rise .4s .15s ease forwards;
    }

    /* ── form wrapper ── */
    .form-wrap{
      width:100%;
      max-width:780px;
      margin:0 auto;
      padding:0 20px 80px;
      opacity:0;
      animation:rise .55s .2s ease forwards;
    }

    /* Typeform full-page embed */
    .tf-embed{
      width:100%;
      height:600px;
      border:none;
      border-radius:16px;
      overflow:hidden;
    }

    /* ── footer ── */
    .footer-band{
      background:var(--accent);
      padding:40px 0;
      text-align:center;
    }
    .footer-copy{
      font-size:14px;
      font-weight:500;
      color:#120c04;
    }

    @keyframes rise{to{opacity:1;transform:translateY(0);}}

    @media(max-width:600px){
      .page-header h1{font-size:32px;}
      .page-header p{font-size:15px;}
      .tf-embed{height:520px;}
    }
  </style>
</head>
<body>

<div class="container">
  <nav class="nav">
    <span class="nav-logo">jadpal.ai</span>
    <a class="nav-back" href="index.html">
      ← Back
    </a>
  </nav>
</div>

<div class="page-header">
  <h1>Submit the application below</h1>
  <p>Takes 2 minutes. We'll reach out if you qualify for a free automation audit.</p>
</div>

<div class="divider"></div>

<div class="form-wrap">
  <iframe
    class="tf-embed"
    src="https://form.typeform.com/to/BXcVis6o"
    title="jadpal.ai application"
    allow="camera; microphone; autoplay; encrypted-media;"
  ></iframe>
</div>

<footer class="footer-band">
  <p class="footer-copy">jadpal.ai &copy; 2026 &ndash; All rights reserved.</p>
</footer>

</body>
</html>
