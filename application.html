  <link rel="stylesheet" href="//embed.typeform.com/next/css/widget.css"/>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&display=swap" rel="stylesheet">

  <style>
    :root {
      --accent:       #2dd4bf;
      --accent-glow:  rgba(45,212,191,0.3);
      --text-1:       #ffffff;
      --text-2:       rgba(255,255,255,0.65);
      --border:       rgba(255,255,255,0.12);
      --border-teal:  rgba(45,212,191,0.35);
      --glass:        rgba(255,255,255,0.07);
    }

    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    html{scroll-behavior:smooth;}
    body{
      background:linear-gradient(160deg,#071e1b 0%,#0d3530 45%,#093028 70%,#071e1b 100%) fixed;
      color:var(--text-1);
      font-family:'Inter',sans-serif;
      font-size:16px;line-height:1.5;
      -webkit-font-smoothing:antialiased;
      overflow-x:hidden;min-height:100vh;
    }
    a{text-decoration:none;color:inherit;}

    .container{width:100%;max-width:1200px;margin:0 auto;padding:0 20px;}

    .nav{
      display:flex;align-items:center;justify-content:space-between;
      padding:20px 0;border-bottom:1px solid var(--border);
    }
    .nav-logo{font-size:20px;font-weight:900;letter-spacing:-0.04em;color:var(--accent);}
    .nav-back{
      font-size:14px;font-weight:500;color:var(--text-2);
      display:inline-flex;align-items:center;gap:6px;transition:color .2s;
    }
    .nav-back:hover{color:var(--text-1);}

    .page-header{
      text-align:center;padding:56px 20px 40px;
      opacity:0;transform:translateY(30px);
      animation:rise .55s ease forwards;
    }
    .page-header h1{
      font-size:52px;font-weight:700;
      letter-spacing:-0.03em;line-height:1.1;color:var(--text-1);
    }
    .page-header p{
      margin-top:14px;font-size:18px;font-weight:400;color:var(--text-2);
      max-width:560px;margin-left:auto;margin-right:auto;
    }

    .divider{
      width:100%;max-width:780px;margin:0 auto 32px;height:1px;
      background:var(--border);opacity:0;animation:rise .4s .15s ease forwards;
    }

    .form-wrap{
      width:100%;max-width:780px;margin:0 auto;padding:0 20px 80px;
      opacity:0;animation:rise .55s .2s ease forwards;
    }

    #tf-widget{
      width:100%;height:600px;border-radius:20px;overflow:hidden;
      background:var(--glass);outline:1px solid var(--border);
    }

    .footer-band{
      background:rgba(0,0,0,0.3);border-top:1px solid var(--border);
      padding:40px 0;text-align:center;
    }
    .footer-copy{font-size:14px;font-weight:400;color:var(--text-2);}

    @keyframes rise{to{opacity:1;transform:translateY(0);}}

    @media(max-width:600px){
      .page-header h1{font-size:32px;}
      .page-header p{font-size:15px;}
      #tf-widget{height:520px;}
    }
  </style>
</head>
<body>

<div class="container">
  <nav class="nav">
    <span class="nav-logo">jadpal.ai</span>
    <a class="nav-back" href="index.html">← Back</a>
  </nav>
</div>

<div class="page-header">
  <h1>Submit the application below</h1>
  <p>Takes 2 minutes. We'll reach out if you qualify for a free automation audit.</p>
</div>

<div class="divider"></div>

<div class="form-wrap">
  <div id="tf-widget"></div>
</div>

<footer class="footer-band">
  <p class="footer-copy">jadpal.ai &copy; 2026 &ndash; All rights reserved.</p>
</footer>

<script>
  window.addEventListener('load', function () {
    if (typeof window.tf === 'undefined') {
      // Fallback: plain iframe if SDK fails
      document.getElementById('tf-widget').innerHTML =
        '<iframe src="https://form.typeform.com/to/BXcVis6o" style="width:100%;height:100%;border:none;" allow="camera;microphone;autoplay;encrypted-media;" title="jadpal.ai application"></iframe>';
      return;
    }

    window.tf.createWidget(document.getElementById('tf-widget'), {
      formId: 'BXcVis6o',
      opacity: 0,
      hideHeaders: true,
      hideFooter: true,
      onSubmit: function () {
        // Fire Meta Pixel Lead conversion
        if (typeof fbq !== 'undefined') {
          fbq('track', 'Lead');
        }
        // Redirect to thank-you page
        window.location.href = 'thank-you.html';
      }
    });
  });
</script>

</body>
</html>
